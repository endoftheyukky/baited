<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>baited — sound</title>
  <style>
    * { margin: 0; padding: 0; }
    body {
      background: #141618; color: #666;
      font-family: Helvetica Neue, sans-serif; font-size: 14px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 100vh; gap: 20px;
    }
    .title { color: #444; font-size: 13px; }
    .tracks { display: flex; gap: 40px; }
    .track { text-align: center; }
    .track .indicator { font-size: 36px; color: #333; }
    .track .indicator.on { color: #eee; }
    .track .label { font-size: 10px; color: #555; margin-top: 4px; }
    #start-btn {
      padding: 12px 32px; font-size: 16px;
      background: #222; color: #888; border: 1px solid #444;
      border-radius: 4px; cursor: pointer;
    }
    #start-btn:hover { background: #333; }
    #start-btn.hidden { display: none; }
    .info { color: #333; font-size: 11px; }
    .status { font-size: 11px; color: #444; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="title">baited — sound system</div>
  <div class="tracks">
    <div class="track">
      <div class="indicator" id="ind-bgm">●</div>
      <div class="label">AMBIENT BGM</div>
    </div>
    <div class="track">
      <div class="indicator" id="ind-se">●</div>
      <div class="label">BUG SE</div>
    </div>
  </div>
  <div class="status" id="state-label">waiting</div>
  <button id="start-btn" onclick="initAudio()">Click to enable audio</button>
  <div class="info">Web Audio requires user interaction to start</div>
  <script src="player.js"></script>
</body>
</html>
